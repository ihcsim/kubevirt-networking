apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-az1
spec:
  runStrategy: RerunOnFailure
  template:
    metadata:
      labels:
        kubevirt.io/size: small
        kubevirt.io/domain: testvm
        az: az1
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["az1"]
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: az
                    operator: In
                    values: ["az1"]
              topologyKey: topology.kubernetes.io/zone
      domain:
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
            - name: br0
              bridge: {}
        resources:
          requests:
            memory: 5Gi
            cpu: 2
      readinessProbe:
        initialDelaySeconds: 60
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 3
        successThreshold: 3
        httpGet:
          port: 80
      networks:
        - name: default
          pod: {}
        - name: br0
          multus:
            networkName: br0
      volumes:
        - name: containerdisk
          containerDisk:
            image: isim/ubuntu-containerdisk:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            networkData: |
              version: 2
              ethernets:
                enp:
                  match:
                    name: "enp*"
                  dhcp4: true
            secretRef:
              name: cloudinit
---
apiVersion: v1
kind: Service
metadata:
  name: netutils-az1
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: netutils-az1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netutils-az1
  labels:
    app: netutils-az1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netutils-az1
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: br0
      labels:
        app: netutils-az1
        az: az1
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["az1"]
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: az
                    operator: In
                    values: ["az1"]
              topologyKey: topology.kubernetes.io/zone
      containers:
        - name: netutils
          image: isim/netutils:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 1
            requests:
              cpu: 0.1
---
