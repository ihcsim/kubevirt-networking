apiVersion: apps/v1
kind: Deployment
metadata:
  name: netutils-vlan-bridge
  labels:
    app: netutils-vlan-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      network-type: vlan-bridge
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: vlan-bridge-1901,vlan-bridge-2050
      labels:
        network-type: vlan-bridge
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: network-type
                    operator: In
                    values: ["vlan-bridge"]
              topologyKey: kubernetes.io/hostname
      containers:
        - name: netutils
          image: isim/netutils:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 1
            requests:
              cpu: 0.1
